name: deploy

on:
  workflow_run:
    workflows: ["tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: Deploy through Lando webhook
        env:
          DEPLOY_URL: https://deploy.timkley.dev/deploy
          OIDC_AUDIENCE: lando-deploy
        run: |
          oidc_token="$(
            curl -fsSL \
              -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}" \
              | jq -r '.value'
          )"

          curl --fail-with-body -sSL \
            -X POST \
            -H "Authorization: Bearer ${oidc_token}" \
            -H "Content-Type: application/json" \
            --data '{}' \
            "$DEPLOY_URL"
